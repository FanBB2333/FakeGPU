site_name: FakeGPU
site_description: FakeGPU project documentation
site_url: https://fanbb2333.github.io/FakeGPU/
repo_url: https://github.com/FanBB2333/FakeGPU
repo_name: FanBB2333/FakeGPU
docs_dir: docs

theme:
  name: material
  language: zh
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: blue grey
      accent: cyan
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - 首页: index.md
  - 快速开始: getting-started.md
  - 快速参考: quick-reference.md
  - 项目结构: project-structure.md
  - 分布式模拟:
      - 使用说明: distributed-sim-usage.md
      - 设计文档: multi-node-design.md
  - 问题排查:
      - cuBLASLt 兼容修复: cublaslt-fix.md
